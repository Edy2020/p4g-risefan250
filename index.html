<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description"
        content="Tracker personal para el logro Hardcore Risette Fan de Persona 4 Golden — 250 frases únicas de navegación de Rise Kujikawa.">

    <title>Hardcore Risette Fan — P4G Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #F5C400;
            --gold-dark: #C49B00;
            --gold-light: #FFD740;
            --black: #0D0D0D;
            --dark: #1A1A1A;
            --mid: #2D2D2D;
            --mid2: #3D3D3D;
            --light: #BFBFBF;
            --white: #FFFFFF;
            --danger: #E53935;
            --danger-dark: #B71C1C;
            --checked-bg: #F5C400;
            --checked-fg: #0D0D0D;

            --font-title: 'Bebas Neue', sans-serif;
            --font-body: 'Inter', sans-serif;

            --border: 2px solid var(--mid2);
            --border-gold: 2px solid var(--gold);

            --radius-sm: 3px;
            --radius-md: 5px;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #site-header {
            background-color: var(--gold);
            border-bottom: 4px solid var(--gold-dark);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-tag {
            font-family: var(--font-title);
            font-size: 1.1rem;
            background-color: var(--black);
            color: var(--gold);
            padding: 2px 8px;
            letter-spacing: 0.05em;
            border-radius: var(--radius-sm);
        }

        .brand-title {
            font-family: var(--font-title);
            font-size: 1.6rem;
            color: var(--black);
            letter-spacing: 0.04em;
            line-height: 1;
        }

        .header-subtitle {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--black);
            opacity: 0.65;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        #progress-hero {
            background-color: var(--dark);
            border-bottom: var(--border);
            padding: 24px 16px;
        }

        .hero-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .counter-block {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }

        .counter-numbers {
            display: flex;
            align-items: baseline;
            gap: 6px;
            line-height: 1;
        }

        .count-current {
            font-family: var(--font-title);
            font-size: 4.5rem;
            color: var(--gold);
            letter-spacing: -0.02em;
            transition: transform 0.1s ease;
        }

        .count-current.bump {
            transform: scale(1.08);
        }

        .count-separator {
            font-family: var(--font-title);
            font-size: 3rem;
            color: var(--light);
        }

        .count-target {
            font-family: var(--font-title);
            font-size: 3rem;
            color: var(--light);
        }

        .counter-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--light);
            align-self: flex-end;
            padding-bottom: 8px;
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar-outer {
            flex: 1;
            height: 12px;
            background-color: var(--mid);
            border: var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .progress-bar-inner {
            height: 100%;
            width: 0%;
            background-color: var(--gold);
            transition: width 0.3s ease;
            border-radius: var(--radius-sm);
        }

        .progress-pct {
            font-family: var(--font-title);
            font-size: 1.4rem;
            color: var(--gold);
            min-width: 52px;
            text-align: right;
        }

        .hero-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            background-color: var(--mid);
            color: var(--white);
            border: var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 14px;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        .action-btn:hover,
        .action-btn:focus-visible {
            background-color: var(--gold);
            color: var(--black);
            border-color: var(--gold);
            outline: none;
        }

        .action-btn--danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .action-btn--danger:hover,
        .action-btn--danger:focus-visible {
            background-color: var(--danger);
            color: var(--white);
            border-color: var(--danger);
        }

        #tracker-main {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 80px;
        }

        .cat-block {
            margin-bottom: 16px;
            border: var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .cat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background-color: var(--mid);
            cursor: pointer;
            user-select: none;
            gap: 12px;
            border: none;
            width: 100%;
            text-align: left;
            transition: background-color 0.15s ease;
        }

        .cat-header:hover {
            background-color: var(--mid2);
        }

        .cat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cat-chevron {
            font-size: 0.7rem;
            color: var(--gold);
            transition: transform 0.2s ease;
            flex-shrink: 0;
            font-style: normal;
        }

        .cat-block.open .cat-chevron {
            transform: rotate(90deg);
        }

        .cat-title {
            font-family: var(--font-title);
            font-size: 1.25rem;
            color: var(--gold);
            letter-spacing: 0.05em;
        }

        .cat-badge {
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 700;
            background-color: var(--gold);
            color: var(--black);
            padding: 2px 7px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            letter-spacing: 0.04em;
        }

        .cat-body {
            display: none;
            background-color: var(--dark);
        }

        .cat-block.open .cat-body {
            display: block;
        }

        .subcat-block {
            border-top: var(--border);
        }

        .subcat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px 11px 28px;
            background-color: var(--dark);
            cursor: pointer;
            user-select: none;
            gap: 12px;
            border: none;
            width: 100%;
            text-align: left;
            transition: background-color 0.15s ease;
        }

        .subcat-header:hover {
            background-color: var(--mid);
        }

        .subcat-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subcat-chevron {
            font-size: 0.6rem;
            color: var(--light);
            transition: transform 0.2s ease;
            font-style: normal;
            flex-shrink: 0;
        }

        .subcat-block.open .subcat-chevron {
            transform: rotate(90deg);
        }

        .subcat-title {
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .subcat-badge {
            font-size: 0.65rem;
            font-weight: 700;
            background-color: var(--mid2);
            color: var(--light);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
        }

        .subcat-body {
            display: none;
            background-color: var(--black);
        }

        .subcat-block.open .subcat-body {
            display: block;
        }

        .group-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold-dark);
            padding: 10px 16px 4px 40px;
            border-top: 1px solid var(--mid);
        }

        .line-list {
            list-style: none;
            padding: 4px 0 8px 0;
        }

        .line-item {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .line-btn {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            width: 100%;
            padding: 9px 16px 9px 40px;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.12s ease;
            border-bottom: 1px solid var(--mid);
        }

        .line-btn:last-child {
            border-bottom: none;
        }

        .line-btn:hover {
            background-color: var(--mid);
        }

        .line-btn:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: -2px;
        }

        .line-check {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border: 2px solid var(--mid2);
            border-radius: var(--radius-sm);
            background-color: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
            transition: background-color 0.12s ease, border-color 0.12s ease;
        }

        .line-check-mark {
            display: none;
            font-size: 11px;
            color: var(--black);
            font-weight: 900;
            line-height: 1;
        }

        .line-btn.heard {
            background-color: var(--mid);
        }

        .line-btn.heard .line-check {
            background-color: var(--gold);
            border-color: var(--gold);
        }

        .line-btn.heard .line-check-mark {
            display: block;
        }

        .line-btn.heard .line-text {
            color: var(--light);
            text-decoration: line-through;
            text-decoration-color: var(--mid2);
        }

        .line-text {
            font-size: 0.82rem;
            color: var(--white);
            line-height: 1.45;
            font-weight: 400;
            transition: color 0.12s ease;
        }

        .achievement-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background-color: var(--gold);
            color: var(--black);
            border: 3px solid var(--black);
            border-radius: var(--radius-md);
            padding: 14px 24px;
            min-width: 280px;
            max-width: 90vw;
            animation: slideUp 0.3s ease forwards;
        }

        .achievement-inner {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .achievement-icon {
            font-size: 2rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .achievement-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .achievement-text strong {
            font-family: var(--font-title);
            font-size: 1.1rem;
            letter-spacing: 0.06em;
        }

        .achievement-text span {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            opacity: 0.7;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.75);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-box {
            background-color: var(--dark);
            border: var(--border-gold);
            border-radius: var(--radius-md);
            padding: 28px 24px;
            max-width: 360px;
            width: 100%;
        }

        .modal-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--gold);
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }

        .modal-body {
            font-size: 0.85rem;
            color: var(--light);
            margin-bottom: 20px;
            line-height: 1.55;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--mid);
            border: var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            transition: border-color 0.15s ease;
        }

        .search-wrap:focus-within {
            border-color: var(--gold);
        }

        .search-icon {
            font-size: 0.85rem;
            flex-shrink: 0;
            opacity: 0.7;
            line-height: 1;
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--white);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            min-width: 0;
            padding: 4px 0;
        }

        .search-input::placeholder {
            color: var(--light);
            opacity: 0.55;
        }

        .search-input::-webkit-search-cancel-button,
        .search-input::-webkit-search-decoration {
            -webkit-appearance: none;
            appearance: none;
        }

        .search-clear {
            background: none;
            border: none;
            color: var(--light);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
            flex-shrink: 0;
            transition: color 0.12s ease;
        }

        .search-clear:hover {
            color: var(--gold);
        }

        .search-count {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--gold);
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.03em;
        }

        .line-text mark {
            background-color: var(--gold);
            color: var(--black);
            border-radius: 2px;
            padding: 0 2px;
            font-weight: 600;
        }

        .filter-hidden {
            display: none !important;
        }

        .hidden {
            display: none !important;
        }

        /* Character Filters */
        .char-filter-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }

        .char-filter-btn {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 600;
            background-color: var(--dark);
            color: var(--light);
            border: 2px solid var(--mid2);
            border-radius: 20px;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .char-filter-btn:hover {
            border-color: var(--light);
            color: var(--white);
        }

        .char-filter-btn:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 1px;
        }

        .char-filter-btn.active {
            color: var(--black);
            background-color: var(--char-color, var(--gold));
            border-color: var(--char-color, var(--gold));
        }

        .char-filter-btn[data-char="all"] {
            --char-color: var(--gold);
        }

        .char-filter-btn[data-char="protagonist"] {
            --char-color: #8c92ac;
        }

        .char-filter-btn[data-char="yosuke"] {
            --char-color: #ff9a00;
        }

        .char-filter-btn[data-char="chie"] {
            --char-color: #72cc18;
        }

        .char-filter-btn[data-char="yukiko"] {
            --char-color: #f63c6d;
        }

        .char-filter-btn[data-char="kanji"] {
            --char-color: #ffeb3b;
        }

        .char-filter-btn[data-char="teddie"] {
            --char-color: #3aa6ff;
        }

        .char-filter-btn[data-char="naoto"] {
            --char-color: #3b50c1;
        }

        .char-filter-btn[data-char="general"] {
            --char-color: #9e9e9e;
        }

        @media (max-width: 500px) {
            .brand-title {
                font-size: 1.25rem;
            }

            .count-current {
                font-size: 3.5rem;
            }

            .count-separator,
            .count-target {
                font-size: 2.2rem;
            }

            .progress-pct {
                font-size: 1.1rem;
                min-width: 44px;
            }

            .subcat-header {
                padding-left: 16px;
            }

            .group-label {
                padding-left: 16px;
            }

            .line-btn {
                padding-left: 16px;
            }

            .cat-title {
                font-size: 1rem;
            }

            .hero-actions {
                gap: 6px;
            }

            .action-btn {
                font-size: 0.7rem;
                padding: 6px 10px;
            }

            .search-wrap {
                padding: 5px 10px;
            }

            .search-input {
                font-size: 0.8rem;
            }
        }

        @media (min-width: 640px) {
            .hero-inner {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
            }

            .counter-block {
                flex: 0 0 auto;
            }

            .progress-wrap {
                flex: 1 1 200px;
            }

            .hero-actions {
                flex: 0 0 100%;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .line-btn {
                padding-top: 13px;
                padding-bottom: 13px;
            }

            .cat-header {
                padding: 16px;
            }

            .subcat-header {
                padding-top: 13px;
                padding-bottom: 13px;
            }
        }

        .header-lang {
            margin-left: auto;
        }

        .lang-btn-toggle {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            background-color: var(--black);
            color: var(--gold);
            border: var(--border-gold);
            border-radius: var(--radius-sm);
            padding: 4px 10px;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .lang-btn-toggle:hover,
        .lang-btn-toggle:focus-visible {
            background-color: var(--gold);
            color: var(--black);
            outline: none;
        }
    </style>
</head>

<body>

    <header id="site-header">
        <div class="header-inner">
            <div class="header-brand">
                <span class="brand-tag">P4G</span>
                <h1 class="brand-title">Hardcore Risette Fan</h1>
            </div>
            <div class="header-subtitle" id="header-subtitle">Rise Kujikawa — Navigator Lines Tracker</div>
            <div class="header-lang">
                <button id="btn-lang" class="lang-btn-toggle" type="button" aria-label="Cambiar idioma">EN</button>
            </div>
        </div>
    </header>

    <section id="progress-hero" aria-label="Progreso global del logro">
        <div class="hero-inner">

            <div class="counter-block">
                <div class="counter-numbers">
                    <span id="count-current" class="count-current" aria-live="polite">0</span>
                    <span class="count-separator">/</span>
                    <span id="count-target" class="count-target">250</span>
                </div>
                <div class="counter-label">frases escuchadas</div>
            </div>

            <div class="progress-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="250"
                id="progress-wrap">
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="progress-bar-fill"></div>
                </div>
                <div class="progress-pct" id="progress-pct">0%</div>
            </div>

            <div class="search-wrap" id="search-wrap">
                <span class="search-icon" aria-hidden="true">🔍</span>
                <input type="search" id="search-input" class="search-input" placeholder="Buscar frase…"
                    autocomplete="off" spellcheck="false" aria-label="Buscar frase">
                <button id="search-clear" class="search-clear hidden" type="button"
                    aria-label="Limpiar búsqueda">✕</button>
                <span id="search-count" class="search-count hidden" aria-live="polite"></span>
            </div>

            <div class="char-filter-wrap" id="char-filter-wrap">
                <button class="char-filter-btn active" data-char="all" type="button">Todos</button>
                <button class="char-filter-btn" data-char="protagonist" type="button">Protagonista</button>
                <button class="char-filter-btn" data-char="yosuke" type="button">Yosuke</button>
                <button class="char-filter-btn" data-char="chie" type="button">Chie</button>
                <button class="char-filter-btn" data-char="yukiko" type="button">Yukiko</button>
                <button class="char-filter-btn" data-char="kanji" type="button">Kanji</button>
                <button class="char-filter-btn" data-char="teddie" type="button">Teddie</button>
                <button class="char-filter-btn" data-char="naoto" type="button">Naoto</button>
                <button class="char-filter-btn" data-char="general" type="button">Otros</button>
            </div>

            <div class="hero-actions">
                <button id="btn-expand-all" class="action-btn" type="button">Expandir Todo</button>
                <button id="btn-collapse-all" class="action-btn" type="button">Colapsar Todo</button>
                <button id="btn-reset" class="action-btn action-btn--danger" type="button">Reiniciar</button>
            </div>

        </div>
    </section>

    <main id="tracker-main">
        <div id="tracker-container">
        </div>
    </main>

    <div id="achievement-banner" class="achievement-banner hidden" aria-hidden="true" role="status">

        const ACHIEVEMENT_TARGET = 250;

        function loadLang() {
            currentLang = localStorage.getItem(LANG_STORAGE_KEY) || 'es';
        }

        function saveLang() {
            localStorage.setItem(LANG_STORAGE_KEY, currentLang);
        }

        function updateUILabels() {
            const texts = UI_TEXT[currentLang];

            const sub = document.getElementById('header-subtitle');
            if (sub) sub.textContent = texts.subtitle;

            const counterLabel = document.querySelector('.counter-label');
            if (counterLabel) counterLabel.textContent = texts.heard;

            const btnExpand = document.getElementById('btn-expand-all');
            if (btnExpand) btnExpand.textContent = texts.expandAll;

            const btnCollapse = document.getElementById('btn-collapse-all');
            if (btnCollapse) btnCollapse.textContent = texts.collapseAll;

            const btnReset = document.getElementById('btn-reset');
            if (btnReset) btnReset.textContent = texts.reset;

            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.placeholder = texts.searchPlaceholder;
                searchInput.setAttribute('aria-label', currentLang === 'en' ? "Search line" : "Buscar frase");
            }

            const modalTitle = document.getElementById('modal-title');
            if (modalTitle) modalTitle.textContent = texts.resetTitle;

            const modalBody = document.querySelector('#reset-modal .modal-body');
            if (modalBody) modalBody.textContent = texts.resetBody;

            const modalConfirm = document.getElementById('modal-confirm');
            if (modalConfirm) modalConfirm.textContent = texts.resetConfirm;

            const modalCancel = document.getElementById('modal-cancel');
            if (modalCancel) modalCancel.textContent = texts.resetCancel;

            const bannerStrong = document.querySelector('#achievement-banner strong');
            if (bannerStrong) bannerStrong.textContent = texts.achievementTitle;

            const btnLang = document.getElementById('btn-lang');
            if (btnLang) {
                btnLang.textContent = currentLang === 'es' ? 'EN' : 'ES';
                btnLang.setAttribute('aria-label', currentLang === 'es' ? 'Switch to English' : 'Cambiar a Español');
            }

            document.querySelectorAll('.char-filter-btn').forEach(btn => {
                const char = btn.dataset.char;
                const key = 'char' + char.charAt(0).toUpperCase() + char.slice(1);
                if (texts[key]) {
                    btn.textContent = texts[key];
                }
            });
        }

        function toggleLang() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            saveLang();
            updateUILabels();
            renderTracker();
            updateProgress();

            const searchInput = document.getElementById('search-input');
            if (searchInput && searchInput.value) {
                performSearch(searchInput.value);
            }
        }

            loadLang();
            updateUILabels();

            const btnLang = document.getElementById('btn-lang');
            if (btnLang) {
                btnLang.addEventListener('click', toggleLang);
            }
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const arr = JSON.parse(raw);
                    heardSet = new Set(Array.isArray(arr) ? arr : []);
                }
            } catch {
                heardSet = new Set();
            }
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...heardSet]));
        }

        function el(tag, attrs = {}, ...children) {
            const node = document.createElement(tag);
            for (const [key, val] of Object.entries(attrs)) {
                if (key === 'className') node.className = val;
                else if (key === 'id') node.id = val;
                else if (key === 'type') node.type = val;
                else if (key === 'role') node.setAttribute('role', val);
                else if (key === 'ariaLabel') node.setAttribute('aria-label', val);
                else if (key === 'ariaExpanded') node.setAttribute('aria-expanded', val);
                else if (key.startsWith('data')) node.setAttribute(key, val);
                else node[key] = val;
            }
            for (const child of children) {
                if (typeof child === 'string') node.appendChild(document.createTextNode(child));
                else if (child) node.appendChild(child);
            }
            return node;
        }

        function updateProgress() {
            const total = ACHIEVEMENT_TARGET;
            const count = heardSet.size;
            const pct = total > 0 ? Math.min(100, Math.round((count / total) * 100)) : 0;

            const countEl = document.getElementById('count-current');
            countEl.textContent = count;
            countEl.classList.remove('bump');
            void countEl.offsetWidth;
            countEl.classList.add('bump');
            setTimeout(() => countEl.classList.remove('bump'), 150);

            document.getElementById('count-target').textContent = total;

            const fill = document.getElementById('progress-bar-fill');
            fill.style.width = `${pct}%`;

            document.getElementById('progress-pct').textContent = `${pct}%`;

            const wrap = document.getElementById('progress-wrap');
            wrap.setAttribute('aria-valuenow', count);

            const banner = document.getElementById('achievement-banner');
            if (count >= total) {
                banner.classList.remove('hidden');
                banner.setAttribute('aria-hidden', 'false');
            } else {
                banner.classList.add('hidden');
                banner.setAttribute('aria-hidden', 'true');
            }

            updateAllBadges();
        }

        function getCharacterOfLine(id) {
            const num = parseInt(id.split('-').pop());
            if (isNaN(num)) return 'general';

            for (const [charName, ranges] of Object.entries(CHARACTER_RANGES)) {
                for (const range of ranges) {
                    if (Array.isArray(range)) {
                        if (num >= range[0] && num <= range[1]) return charName;
                    } else {
                        if (num === range) return charName;
                    }
                }
            }
            return 'general';
        }

        function countHeardInContainer(container) {
            let total = 0, heard = 0;
            container.querySelectorAll('.line-btn[data-line-id]').forEach(btn => {
                const lineId = btn.dataset.lineId;
                const charOfLine = getCharacterOfLine(lineId);

                if (activeCharFilter === 'all' || activeCharFilter === charOfLine) {
                    total++;
                    if (heardSet.has(lineId)) heard++;
                }
            });
            return { total, heard };
        }

        function updateAllBadges() {
            document.querySelectorAll('.cat-block').forEach(catBlock => {
                const badge = catBlock.querySelector(':scope > .cat-header .cat-badge');
                if (badge) {
                    const { total, heard } = countHeardInContainer(catBlock);
                    badge.textContent = `${heard} / ${total}`;
                }
            });

            document.querySelectorAll('.subcat-block').forEach(subcatBlock => {
                const badge = subcatBlock.querySelector(':scope > .subcat-header .subcat-badge');
                if (badge) {
                    const { total, heard } = countHeardInContainer(subcatBlock);
                    badge.textContent = `${heard} / ${total}`;
                }
            });
        }

        function toggleLine(lineId, btn) {
            if (heardSet.has(lineId)) {
                heardSet.delete(lineId);
                btn.classList.remove('heard');
                btn.setAttribute('aria-pressed', 'false');
            } else {
                heardSet.add(lineId);
                btn.classList.add('heard');
                btn.setAttribute('aria-pressed', 'true');
            }
            saveState();
            updateProgress();
        }

            const isOpen = block.classList.toggle('open');
            headerEl.setAttribute('aria-expanded', isOpen ? 'true' : 'false');

            document.querySelectorAll('.cat-block, .subcat-block').forEach(b => {
                b.classList.remove('open');
                const h = b.querySelector(':scope > button');
                if (h) h.setAttribute('aria-expanded', 'false');
            });
        }

        function renderLine(lineData) {
            const isHeard = heardSet.has(lineData.id);
            const li = el('li', { className: 'line-item' });
            const lineText = getOriginalText(lineData.id) || lineData.line;

            const btn = el('button', {
                className: `line-btn${isHeard ? ' heard' : ''}`,
                type: 'button',
                'data-line-id': lineData.id,
                ariaLabel: lineText,
                'aria-pressed': isHeard ? 'true' : 'false',
            });

            const checkBox = el('span', {
                className: 'line-check',
                role: 'presentation'
            },
                el('span', { className: 'line-check-mark' }, '✓')
            );
            const text = el('span', { className: 'line-text' }, lineText);

            btn.appendChild(checkBox);
            btn.appendChild(text);

            btn.addEventListener('click', () => toggleLine(lineData.id, btn));

            li.appendChild(btn);
            return li;
        }

        function groupByGroup(entries) {
            const map = new Map();
            for (const entry of entries) {
                const key = entry.group || '__none__';
                if (!map.has(key)) map.set(key, []);
                map.get(key).push(...entry.lines);
            }
            return [...map.entries()].map(([group, lines]) => ({
                group: group === '__none__' ? null : group,
                lines,
            }));
        }

        function renderSubcatBlock(subcatName, entries) {
            const block = el('div', { className: 'subcat-block' });
            const translatedSubcatName = (CAT_TEXT[currentLang] && CAT_TEXT[currentLang][subcatName]) || subcatName;

            const header = el('button', {
                className: 'subcat-header',
                type: 'button',
                ariaExpanded: 'false',
                ariaLabel: currentLang === 'en' ? `Subcategory: ${translatedSubcatName}` : `Subcategoría: ${translatedSubcatName}`,
            });

            const left = el('div', { className: 'subcat-header-left' },
                el('i', { className: 'subcat-chevron' }, '▶'),
                el('span', { className: 'subcat-title' }, translatedSubcatName)
            );
            const badge = el('span', { className: 'subcat-badge' }, '0 / 0');

            header.appendChild(left);
            header.appendChild(badge);
            header.addEventListener('click', () => toggleAccordion(block, header));

            const body = el('div', { className: 'subcat-body' });

            const allLines = entries.flatMap(e => e.lines);
            const hasGroups = entries.some(e => e.group !== null);

            if (hasGroups) {
                const grouped = groupByGroup(entries);
                for (const { group, lines } of grouped) {
                    if (group) {
                        body.appendChild(el('div', { className: 'group-label' }, group));
                    }
                    const ul = el('ul', { className: 'line-list' });
                    lines.forEach(l => ul.appendChild(renderLine(l)));
                    body.appendChild(ul);
                }
            } else {
                const ul = el('ul', { className: 'line-list' });
                allLines.forEach(l => ul.appendChild(renderLine(l)));
                body.appendChild(ul);
            }

            block.appendChild(header);
            block.appendChild(body);
            return block;
        }

        function renderCategoryBlock(categoryName, subcatMap) {
            const block = el('div', { className: 'cat-block' });
            const translatedCategoryName = (CAT_TEXT[currentLang] && CAT_TEXT[currentLang][categoryName]) || categoryName;

            const header = el('button', {
                className: 'cat-header',
                type: 'button',
                ariaExpanded: 'false',
                ariaLabel: currentLang === 'en' ? `Category: ${translatedCategoryName}` : `Categoría: ${translatedCategoryName}`,
            });

            const left = el('div', { className: 'cat-header-left' },
                el('i', { className: 'cat-chevron' }, '▶'),
                el('span', { className: 'cat-title' }, translatedCategoryName)
            );
            const badge = el('span', { className: 'cat-badge' }, '0 / 0');

            header.appendChild(left);
            header.appendChild(badge);
            header.addEventListener('click', () => toggleAccordion(block, header));

            const body = el('div', { className: 'cat-body' });

            for (const [subcatName, entries] of subcatMap.entries()) {
                body.appendChild(renderSubcatBlock(subcatName, entries));
            }

            block.appendChild(header);
            block.appendChild(body);
            return block;
        }

        function buildDataMap() {
            const catMap = new Map();
            for (const entry of RISE_DATA) {
                if (!catMap.has(entry.category)) {
                    catMap.set(entry.category, new Map());
                }
                const subMap = catMap.get(entry.category);
                if (!subMap.has(entry.subcategory)) {
                    subMap.set(entry.subcategory, []);
                }
                subMap.get(entry.subcategory).push(entry);
            }
            return catMap;
        }

        function renderTracker() {
            const container = document.getElementById('tracker-container');
            if (!container) return;

            container.innerHTML = '';
            const catMap = buildDataMap();

            for (const [catName, subMap] of catMap.entries()) {
                container.appendChild(renderCategoryBlock(catName, subMap));
            }

            updateAllBadges();
        }

        function resetAll() {
            heardSet.clear();
            saveState();
            document.querySelectorAll('.line-btn[data-line-id]').forEach(btn => {
                btn.classList.remove('heard');
                btn.setAttribute('aria-pressed', 'false');
            });

            updateProgress();
        }

        function initModal() {
            const modal = document.getElementById('reset-modal');
            const btnOpen = document.getElementById('btn-reset');
            const btnConfirm = document.getElementById('modal-confirm');
            const btnCancel = document.getElementById('modal-cancel');

            if (!modal || !btnOpen) return;

            btnOpen.addEventListener('click', () => {
                modal.classList.remove('hidden');
                btnConfirm.focus();
            });

            btnCancel.addEventListener('click', () => modal.classList.add('hidden'));

            btnConfirm.addEventListener('click', () => {
                resetAll();
                modal.classList.add('hidden');
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.add('hidden');
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') modal.classList.add('hidden');
            });
        }

        function initControls() {
            document.getElementById('btn-expand-all')
                ?.addEventListener('click', openAll);
            document.getElementById('btn-collapse-all')
                ?.addEventListener('click', collapseAll);
        }

        let activeCharFilter = 'all';
        let searchTimeout = null;

        function initSearch() {
            const input = document.getElementById('search-input');
            const clearBtn = document.getElementById('search-clear');
            if (!input) return;

            input.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => applyFilters(), 180);

                if (input.value.length > 0) {
                    clearBtn.classList.remove('hidden');
                } else {
                    clearBtn.classList.add('hidden');
                }
            });

            clearBtn.addEventListener('click', () => {
                input.value = '';
                clearBtn.classList.add('hidden');
                applyFilters();
                input.focus();
            });

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    if (document.activeElement !== input) {
                        e.preventDefault();
                        input.focus();
                        input.select();
                    }
                }
            });
        }

        function initCharFilters() {
            const wrap = document.getElementById('char-filter-wrap');
            if (!wrap) return;

            wrap.addEventListener('click', (e) => {
                const btn = e.target.closest('.char-filter-btn');
                if (!btn) return;

                wrap.querySelectorAll('.char-filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCharFilter = btn.dataset.char;

                applyFilters();
            });
        }

        function applyFilters() {
            const input = document.getElementById('search-input');
            const query = (input?.value || '').trim();
            const countEl = document.getElementById('search-count');

            const normalizedQuery = query.toLowerCase();
            let matchCount = 0;

            document.querySelectorAll('.line-item').forEach(li => {
                const btn = li.querySelector('.line-btn');
                const textEl = li.querySelector('.line-text');
                if (!btn || !textEl) return;

                const lineId = btn.dataset.lineId;
                const charOfLine = getCharacterOfLine(lineId);
                const original = getOriginalText(lineId) || textEl.textContent;

                // Match character filter
                const matchesChar = (activeCharFilter === 'all' || activeCharFilter === charOfLine);

                // Match search query
                let matchesSearch = true;
                let idx = -1;
                if (normalizedQuery) {
                    const lowerText = original.toLowerCase();
                    idx = lowerText.indexOf(normalizedQuery);
                    matchesSearch = (idx !== -1);
                }

                if (matchesChar && matchesSearch) {
                    li.classList.remove('filter-hidden');
                    if (normalizedQuery && idx !== -1) {
                        textEl.innerHTML = highlightMatch(original, idx, query.length);
                    } else {
                        textEl.textContent = original;
                    }
                    matchCount++;
                } else {
                    li.classList.add('filter-hidden');
                    textEl.textContent = original;
                }
            });

            document.querySelectorAll('.subcat-block').forEach(subcatBlock => {
                const hasVisible = subcatBlock.querySelector('.line-item:not(.filter-hidden)');
                const h = subcatBlock.querySelector(':scope > button');
                if (hasVisible) {
                    subcatBlock.classList.remove('filter-hidden');
                    if (normalizedQuery || activeCharFilter !== 'all') {
                        subcatBlock.classList.add('open');
                        if (h) h.setAttribute('aria-expanded', 'true');
                    }
                } else {
                    subcatBlock.classList.add('filter-hidden');
                }
            });

            document.querySelectorAll('.cat-block').forEach(catBlock => {
                const hasVisible = catBlock.querySelector('.subcat-block:not(.filter-hidden)');
                const h = catBlock.querySelector(':scope > button');
                if (hasVisible) {
                    catBlock.classList.remove('filter-hidden');
                    if (normalizedQuery || activeCharFilter !== 'all') {
                        catBlock.classList.add('open');
                        if (h) h.setAttribute('aria-expanded', 'true');
                    }
                } else {
                    catBlock.classList.add('filter-hidden');
                }
            });

            updateAllBadges();

            if (normalizedQuery) {
                const resultWord = currentLang === 'en' ? 'result' : 'resultado';
                const pluralSuffix = matchCount !== 1 ? 's' : '';
                countEl.textContent = `${matchCount} ${resultWord}${pluralSuffix}`;
                countEl.classList.remove('hidden');
            } else {
                countEl.classList.add('hidden');
            }
        }

        function getOriginalText(lineId) {
            if (currentLang === 'en' && LINE_EN[lineId]) {
                return LINE_EN[lineId];
            }
            for (const entry of RISE_DATA) {
                for (const l of entry.lines) {
                    if (l.id === lineId) return l.line;
                }
            }
            return null;
        }

        function highlightMatch(original, startIndex, length) {
            const before = escapeHtml(original.substring(0, startIndex));
            const match = escapeHtml(original.substring(startIndex, startIndex + length));
            const after = escapeHtml(original.substring(startIndex + length));
            return `${before}<mark>${match}</mark>${after}`;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            initLang();
            renderTracker();
            updateProgress();
            initModal();
            initControls();
            initSearch();
            initCharFilters();
        });

    </script>
</body>

</html>
